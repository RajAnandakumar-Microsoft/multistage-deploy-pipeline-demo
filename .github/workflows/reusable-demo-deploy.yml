name: Reusable Demo Deploy (kind)

# Deploys ONE wave to an ephemeral kind cluster (a stand-in for AKS), validates
# health, and rolls back on failure. Called once per wave by demo-pipeline.yml.
# Mirrors reusable-deploy.yml but with no cloud dependencies.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment + logical stage name.
        required: true
        type: string
      namespace:
        description: Kubernetes namespace to deploy into.
        required: true
        type: string
      image_tag:
        description: Image tag to deploy (commit SHA), promoted unchanged from the build job.
        required: true
        type: string
      values_file:
        description: Helm values file for this wave.
        required: true
        type: string
      release_name:
        description: Helm release name.
        required: false
        type: string
        default: hello-world
      health_timeout:
        description: Timeout for the Helm wait and the rollout health check.
        required: false
        type: string
        default: 120s
      simulate_failure:
        description: If true, deploy a healthy baseline then a broken upgrade so the automatic rollback fires (for demos).
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    # Approval gate: configure required reviewers on this Environment to pause here.
    environment: ${{ inputs.environment }}
    concurrency:
      group: demo-deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the built image
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Create kind cluster (stands in for AKS)
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ inputs.environment }}

      - name: Load the image into kind
        run: kind load image-archive image.tar --name "${{ inputs.environment }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy a healthy baseline first (rollback demo only)
        if: ${{ inputs.simulate_failure }}
        run: |
          set -euo pipefail
          echo "Rollback demo: installing a known-good baseline (revision 1) so the rollback has a healthy version to restore."
          helm upgrade --install "${{ inputs.release_name }}" ./chart \
            --namespace "${{ inputs.namespace }}" --create-namespace \
            --values "${{ inputs.values_file }}" \
            --set image.repository=sample-app \
            --set image.tag="${{ inputs.image_tag }}" \
            --set image.pullPolicy=Never \
            --wait --timeout "${{ inputs.health_timeout }}"

      - name: Deploy with Helm
        run: |
          set -euo pipefail
          tag="${{ inputs.image_tag }}"
          timeout="${{ inputs.health_timeout }}"
          if [ "${{ inputs.simulate_failure }}" = "true" ]; then
            echo "::warning::Failure simulation ON: deploying a broken image tag so the health check fails and triggers a rollback."
            tag="${{ inputs.image_tag }}-broken-demo"
            timeout="60s"
          fi
          helm upgrade --install "${{ inputs.release_name }}" ./chart \
            --namespace "${{ inputs.namespace }}" --create-namespace \
            --values "${{ inputs.values_file }}" \
            --set image.repository=sample-app \
            --set image.tag="$tag" \
            --set image.pullPolicy=Never \
            --wait --timeout "$timeout"

      - name: Health check (rollout status)
        run: |
          set -euo pipefail
          deploy_name=$(kubectl -n "${{ inputs.namespace }}" get deploy \
            -l app.kubernetes.io/instance="${{ inputs.release_name }}" \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Validating rollout of deployment/${deploy_name} in ${{ inputs.namespace }}"
          kubectl -n "${{ inputs.namespace }}" rollout status \
            "deployment/${deploy_name}" --timeout "${{ inputs.health_timeout }}"

      - name: Roll back on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "::warning::Deploy/health check to ${{ inputs.environment }} failed - rolling back"
          revisions=$(helm history "${{ inputs.release_name }}" \
            --namespace "${{ inputs.namespace }}" -o json 2>/dev/null \
            | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))' || echo 0)
          if [ "${revisions}" -ge 2 ]; then
            helm rollback "${{ inputs.release_name }}" 0 \
              --namespace "${{ inputs.namespace }}" \
              --wait --timeout "${{ inputs.health_timeout }}"
            echo "Rolled back to the previous good revision."
          else
            helm uninstall "${{ inputs.release_name }}" \
              --namespace "${{ inputs.namespace }}" || true
            echo "No previous revision; removed the failed initial release."
          fi

      - name: Stage summary
        if: always()
        run: |
          {
            echo "### Deploy to ${{ inputs.environment }} (kind)"
            echo ""
            echo "- Namespace: \`${{ inputs.namespace }}\`"
            echo "- Image: \`sample-app:${{ inputs.image_tag }}\`"
            echo "- Result: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"
