# Default values for the hello-world chart.
# Overridden per environment by values-<env>.yaml and by --set image.* from the
# pipeline. Every value is documented so teams can adapt the chart safely.

# Number of pod replicas for this environment (scaled up in later waves).
replicaCount: 1

image:
  # Full registry path; the pipeline sets this (e.g. <acr>.azurecr.io/hello-world).
  repository: ghcr.io/example/hello-world
  # Image tag; the pipeline sets this to the commit SHA.
  tag: latest
  pullPolicy: IfNotPresent

# Logical stage name surfaced by the app and added to resource labels.
appEnv: unknown

service:
  type: ClusterIP
  port: 80

# Container port the app listens on.
containerPort: 8080

# Health probe configuration — this is the health signal the pipeline gates on.
probes:
  path: /healthz
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
